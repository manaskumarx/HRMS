<!DOCTYPE html>
<html lang="en">


<head>

    <link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/employee-profile.css">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Modern Teams - Employee Profile
</title>


</head>



<body>




<div class="employee-layout">





<!-- ======================
     SIDEBAR
====================== -->


<aside class="sidebar">



<div class="logo">


<img src="assets/logo/mt-logo.jpeg" alt="Logo">


<h2>
Modern Teams
</h2>


</div>





<nav class="menu">



<a href="employee.html">
🏠 Dashboard
</a>




<a href="employee-attendance.html">
🕒 My Attendance
</a>





<a href="employee-leaves.html">
📄 My Leaves
</a>





<a href="employee-announcements.html">
📢 Announcements
</a>





<a class="active" href="employee-profile.html">
⚙ Profile
</a>






<a href="login.html" onclick="logout()">
🚪 Logout
</a>



</nav>



</aside>









<!-- ======================
     MAIN CONTENT
====================== -->


<main class="main-content">






<header class="topbar">


<div>


<h1>
My Profile
</h1>


<p>
Manage your personal information
</p>


</div>





<div class="employee-info">



<div class="notification">

🔔

</div>



<div class="avatar">

E

</div>



</div>



</header>









<section class="profile-section">









<!-- PROFILE VIEW -->


<div class="profile-card">





<div class="profile-image">



<img 
id="employeeImage"
src="assets/images/default-user.png"
alt="Employee Photo">


</div>





<h2 id="employeeName">

Employee Name

</h2>




<p id="employeeRole">

Employee

</p>




<p id="employeeDepartment">

Department

</p>





</div>












<!-- PROFILE UPDATE FORM -->


<div class="profile-form">



<h2>
Update Profile
</h2>




<label>
Full Name
</label>


<input
type="text"
id="name"
placeholder="Enter Name">






<label>
Email
</label>


<input
type="email"
id="email"
readonly>








<label>
Phone Number
</label>


<input
type="text"
id="phone"
placeholder="Phone Number">








<label>
Address
</label>


<textarea
id="address"
placeholder="Enter Address">
</textarea>









<button id="updateProfileBtn">

Update Profile

</button>





<p id="profileMessage"></p>




</div>













<!-- COMPANY DETAILS -->


<div class="company-card">



<h2>
Company Details
</h2>




<div class="details">


<p>

Department:

<span id="department">

--

</span>

</p>





<p>

Designation:

<span id="designation">

--

</span>

</p>





<p>

Joining Date:

<span id="joiningDate">

--

</span>

</p>




<p>

Employee ID:

<span id="employeeId">

--

</span>

</p>



</div>



</div>














<!-- PASSWORD CHANGE -->


<div class="password-card">



<h2>
Change Password
</h2>




<input
type="password"
id="newPassword"
placeholder="New Password">





<button id="changePasswordBtn">

Change Password

</button>



</div>












</section>









</main>






</div>









<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

<script src="js/employee-profile.js"></script>




</body>

</html>
